# Optional YAML configuration for SourceBase
# Values here override defaults when you load this file in your deployment
# This repository currently reads environment variables from .env; this
# YAML file is provided for convenience if you prefer YAML-based config.

# Set a separate model name for embedding requests (e.g. the proxy model named
# "embed"). Leave empty to use the main LLM model.
LLM_EMBEDDING_MODEL: "embed"

# Dimension of vectors produced by the embedding model (e.g. 1024 for
# mxbai-embed-large-v1). This MUST match the model's native output; stored
# vectors and ANN indices are created at this size. Change only when switching
# embedding models.
LLM_EMBEDDING_DIM: 1024

# Number of items to send in a single embedding batch when supported by the
# LLM/embedding proxy. A large default (2048) is used for throughput; adjust
# this if your proxy or model imposes smaller limits.
LLM_EMBEDDING_BATCH_SIZE: 2048

# Maximum characters per embedding chunk. Must stay within the embedding proxy's
# token limit (e.g. 512 tokens). Lower this if you see "input too large" errors.
# Approximate chars-to-tokens ratio is 2–3 for HTML/plain text.
LLM_EMBEDDING_MAX_CHARS: 1100

# Example other LLM settings you may want to declare here:
# LLM_BASE_URL: "http://192.168.0.199:8000/v1"
# LLM_MODEL: "gpt120"
# LLM_MAX_RETRIES: 20
# LLM_RETRY_DELAY_MS: 250
