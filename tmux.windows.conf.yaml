session_name: Dev
windows:
  - name: "SourceBase"
    cwd: "~/projects/SourceBase"
    panes:
      - cmd: "opencode -c"
        focus: true
      - cmd: "wl tui"
        split:
          dir: vertical
          size_pct: 50
      - cmd: "clear"
        split:
          dir: horizontal
          size_pct: 30
